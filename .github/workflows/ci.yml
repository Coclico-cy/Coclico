name: CI — Build & Test

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (.NET 10 / Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Historique complet pour SemVer

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Coclico.slnx

      - name: Build (Release)
        run: dotnet build Coclico.slnx --configuration Release --no-restore

      - name: Lint — verify formatting
        run: dotnet format Coclico.slnx --verify-no-changes
        continue-on-error: true   # Avertissement non-bloquant (formatage style)

      - name: Run tests with coverage
        run: >
          dotnet test Coclico.Tests/Coclico.Tests.csproj
          --configuration Release
          --no-build
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          --logger "trx;LogFileName=test-results.trx"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          flags: unittests
          name: coclico-coverage
          fail_ci_if_error: false   # Ne pas bloquer si Codecov est down
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./coverage/test-results.trx
          retention-days: 30

  release:
    name: Build Release Artifact
    runs-on: windows-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Coclico.slnx

      - name: Publish (self-contained, Windows x64)
        run: >
          dotnet publish Coclico/Coclico.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          --output ./publish
          -p:PublishSingleFile=false

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Coclico-Release-${{ github.sha }}
          path: ./publish/
          retention-days: 90
