name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore "Coclico.slnx"

    - name: Build (TreatWarningsAsErrors)
      run: dotnet build "Coclico.slnx" -c Release -p:TreatWarningsAsErrors=true

    - name: Run tests
      run: dotnet test Coclico.Tests -c Release --no-build -v minimal -p:TreatWarningsAsErrors=true

    - name: Publish artifacts
      if: success()
      run: |
        dotnet publish Coclico/Coclico.csproj -c Release -o ./artifacts/publish
        echo "Published to ./artifacts/publish" 
